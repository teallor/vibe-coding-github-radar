name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Node.js tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run credential-free test suite
        run: npm test
