name: Daily GitHub Scout

on:
  schedule:
    # GitHub Actions uses UTC; 01:00 UTC is 09:00 Beijing time.
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Run daily scout
        run: node scripts/scout.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and verify Codex podcasts
        run: node scripts/find-codex-podcasts.js

      - name: Push combined GitHub and podcast radar to Feishu
        run: node scripts/send-feishu.js --combined
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}

      - name: Upload podcast screening evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-podcast-radar-${{ github.run_id }}
          path: data/codex-podcasts-latest.json
          if-no-files-found: warn
          retention-days: 30

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json reports || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "daily scout update"
            git push
          fi
