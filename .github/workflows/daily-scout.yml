name: Daily GitHub Scout

on:
  schedule:
    # Target Feishu send time: Asia/Shanghai 06:45.
    # Start earlier at Asia/Shanghai 06:20 to generate content before send.
    # Asia/Shanghai 06:20 = UTC 22:20 previous day.
    - cron: "20 22 * * *"
  workflow_dispatch:
    inputs:
      wait_until_target:
        description: "Wait until Asia/Shanghai 06:45 before sending Feishu"
        required: false
        default: false
        type: boolean
      force_send:
        description: "Force a second real Feishu send even if today was already sent"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

# Serialize all runs so a queued run checks the ledger committed by the previous run.
concurrency:
  group: daily-feishu-send
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    env:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

    steps:
      - name: Capture job start time
        run: echo "WORKFLOW_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Run configuration and workflow smoke tests
        run: |
          echo "Running credential-free tests before public discovery or delivery."
          if ! npm test; then
            echo "::error::Smoke tests failed. Review the failing test name before running discovery or Feishu delivery."
            exit 1
          fi

      - name: Log workflow schedule and actual start times
        run: node scripts/time-utils.js --workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud for Vertex AI credits
        if: env.GCP_CREDENTIALS != ''
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ env.GCP_CREDENTIALS }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Run daily scout
        run: |
          node scripts/time-utils.js "内容生成开始时间"
          node scripts/scout.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and verify Codex podcasts
        run: node scripts/find-codex-podcasts.js

      - name: Build Gemini-reviewed AI app and Codex ecosystem radar
        run: |
          node scripts/ai-app-radar.js
          node scripts/time-utils.js "内容生成结束时间"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLOUD_LOCATION: ${{ vars.GOOGLE_CLOUD_LOCATION }}

      - name: Push one combined three-part radar to Feishu
        run: node scripts/send-feishu.js --daily
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          WAIT_UNTIL_TARGET: ${{ github.event_name == 'schedule' || inputs.wait_until_target }}
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && inputs.force_send }}

      - name: Upload podcast screening evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-podcast-radar-${{ github.run_id }}
          path: data/codex-podcasts-latest.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AI app radar screening evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-app-codex-ecosystem-radar-${{ github.run_id }}
          path: data/ai-app-radar-latest.json
          if-no-files-found: warn
          retention-days: 30

      - name: Commit generated reports
        if: always() && !cancelled()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json data/codex-podcasts-latest.json data/ai-app-radar-latest.json data/feedback.json data/push-history.json data/send-ledger.json reports || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "daily scout update"
            git push
          fi
