name: Daily GitHub Scout

on:
  schedule:
    # GitHub Actions uses UTC. 22:28 UTC = 06:28 Beijing time next day.
    # The verified three-radar run takes about 14 minutes, so Feishu normally arrives around 06:42-06:47.
    - cron: "28 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scout:
    runs-on: ubuntu-latest
    env:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Authenticate to Google Cloud for Vertex AI credits
        if: env.GCP_CREDENTIALS != ''
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ env.GCP_CREDENTIALS }}
          project_id: ${{ vars.GOOGLE_CLOUD_PROJECT }}

      - name: Run daily scout
        run: node scripts/scout.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and verify Codex podcasts
        run: node scripts/find-codex-podcasts.js

      - name: Build Gemini-reviewed AI app and Codex ecosystem radar
        run: node scripts/ai-app-radar.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLOUD_LOCATION: ${{ vars.GOOGLE_CLOUD_LOCATION }}

      - name: Push one combined three-part radar to Feishu
        run: node scripts/send-feishu.js --daily
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload podcast screening evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-podcast-radar-${{ github.run_id }}
          path: data/codex-podcasts-latest.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AI app radar screening evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-app-codex-ecosystem-radar-${{ github.run_id }}
          path: data/ai-app-radar-latest.json
          if-no-files-found: warn
          retention-days: 30

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json reports || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "daily scout update"
            git push
          fi
